<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade 10 Classmates System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.3.1/core.css" />
    <script type="module" src="https://pyscript.net/releases/2024.3.1/core.js"></script>

    <!-- Nunito Font -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- Bootstrap Icons for Graduation Cap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <py-config>
packages = ["numpy", "matplotlib"]
    </py-config>

    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background: #f5f7f4;
            color: #4b5c52;
            text-align: center;
        }

        .container-box {
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.08);
            max-width: 600px;
            padding: 40px;
            margin: 50px auto;
            border: 1px solid #9caf9f;
        }

        h1, h2 {
            color: #5f7a67;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #9caf9f;
            font-family: 'Nunito', sans-serif;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        button {
            padding: 12px 24px;
            background-color: #7d9b87;
            border: none;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.2s ease;
            font-family: 'Nunito', sans-serif;
        }

        button:hover {
            background-color: #5f7a67;
            transform: translateY(-2px);
        }

        .output-box {
            margin-top: 25px;
            padding: 20px;
            background-color: #f8faf8;
            border-radius: 8px;
            border: 1px solid #9caf9f;
            color: #3a3a3a;
        }

        nav {
            background-color: #6f8a76;
        }

        #footertext {
            font-family: 'Nunito', sans-serif;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark" style="font-weight: bold;">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="bi bi-mortarboard-fill"></i> 10-Emerald
            </a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="index.html">Classmates</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="page3.html">Attendance Tracker</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="page2.html">Gallery</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-box">
        <h1>Grade 10 Classmates System</h1>
        <h2>Class of 25–26</h2>

        <input type="text" id="name" placeholder="Classmate Name">
        <input type="text" id="section" placeholder="Section">
        <input type="text" id="desiredJob" placeholder="Desired Job">

        <div class="btn-group">
            <button py-click="add_classmate">Add New Classmate</button>
            <button py-click="show_list">Show Classmate List</button>
        </div>

        <div class="output-box" id="signed"></div>
        <div class="output-box" id="classmate-list"></div>
    </div>

    <footer>
        <p id="footertext">SY 2025-2026 10-Emerald. All Rights Reserved.</p>
    </footer>

    <script type="py" src="main.py"></script>
</body>
</html>
