<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Attendance Tracker</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.3.1/core.css" />
    <script type="module" src="https://pyscript.net/releases/2024.3.1/core.js"></script>

    <py-config>
packages = ["numpy", "matplotlib"]
    </py-config>

    <script type="py" src="main.py"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
        }

        #mainb {
            display: flex;
            justify-content: space-around;
            align-items: center;
            height: calc(100vh - 56px);
        }

        .main-container {
            display: flex;
            gap: 40px;
            align-items: center;
        }

        .card {
            padding: 30px;
            border-radius: 15px;
            width: 400px;
            height: 500px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            background: white;
        }

        .card h2 {
            text-align: center;
            color: #2a5298;
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }

        select, input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 5px;
            border: none;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            background: #2a5298;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #376ecd;
        }

        #signed {
            margin-top: 10px;
            text-align: center;
            font-weight: bold;
            color: #2a5298;
        }

        .graph {
            border-radius: 8px;
            width: 500px;
            height: 500px;
        }

        nav {
            background-color:#17366c;
        }

        #footertext {
            text-align: center;
            color:white;
            font-family: 'Times New Roman', Times, serif;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark" style="font-weight: bold;">
        <div class="container">
            <a class="navbar-brand" href="index.html">10-Emerald</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Classmates</a></li>
                    <li class="nav-item"><a class="nav-link active" href="page3.html">Attendance Tracker</a></li>
                    <li class="nav-item"><a class="nav-link" href="page2.html">Gallery</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div id="mainb">
        <div class="main-container">
            <div class="card">
                <h2>Attendance Tracker</h2>

                <label>Choose Day:</label>
                <select id="day">
                    <option>Monday</option>
                    <option>Tuesday</option>
                    <option>Wednesday</option>
                    <option>Thursday</option>
                    <option>Friday</option>
                </select>

                <label>Absences:</label>
                <input type="number" id="absence" placeholder="Enter number">

                <button py-click="displaying">Submit</button>

                <div id="signed"></div>
            </div>

            <div id="graph" class="graph"></div>
        </div>
    </div>

    <footer>
        <p id="footertext">SY 2025-2026 10-Emerald. All Rights Reserved.</p>
    </footer>

</body>
</html>
